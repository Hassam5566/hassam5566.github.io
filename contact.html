<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <h1>AI Emergency Care</h1>
</nav>

<div class="container">

    <div class="card">
        <h2>📞 Contact & Support</h2>
        <p>Send a message to our AI healthcare support team.</p>

        <form onsubmit="return validateForm()">

            <label>Name</label>
            <input type="text" id="name"><br><br>

            <label>Email</label>
            <input type="email" id="email"><br><br>

            <label>Message</label>
            <textarea id="message"></textarea><br><br>

            <button type="submit">Send Message</button>

        </form>

        <p id="formError" style="color:red;"></p>
        <p id="successMsg" class="success"></p>
    </div>

</div>

<footer>© 2026 AI Emergency Care</footer>

<script src="script.js"></script>

</body>
</html>
